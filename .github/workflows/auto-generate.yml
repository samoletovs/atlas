name: Auto-generate atlas lessons

# Runs every 4 hours. For each `repos` doc with autoGenerate=true whose
# interval has elapsed, asks the planner to propose lessons from recent
# commits and queues them; then drains every queued lesson (including
# ones queued by the UI) via the same Foundry agent the API uses.
#
# Per-repo cadence and unreadTarget live on the Cosmos `repos` doc. The
# workflow cron is just the heartbeat — gating happens in run_auto().

on:
  schedule:
    - cron: '0 */4 * * *'  # every 4 hours at the top of the hour
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: auto-generate
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install script dependencies
        working-directory: scripts
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Plan + drain lessons
        env:
          COSMOS_ENDPOINT: ${{ vars.COSMOS_ENDPOINT }}
          COSMOS_DATABASE: ${{ vars.COSMOS_DATABASE }}
          FOUNDRY_PROJECT_ENDPOINT: ${{ vars.FOUNDRY_PROJECT_ENDPOINT }}
          FOUNDRY_DEPLOYMENT: ${{ vars.FOUNDRY_DEPLOYMENT }}
          ATLAS_OWNER_LOGIN: ${{ vars.ATLAS_OWNER_LOGIN }}
          # Optional. If present, raises GitHub anonymous rate-limit (60/h)
          # to 5000/h and unlocks private-repo reads. Anonymous mode still
          # works for public repos.
          GITHUB_TOKEN_FOR_ATLAS: ${{ secrets.GITHUB_TOKEN_FOR_ATLAS }}
        run: python scripts/generate_lessons.py --auto
