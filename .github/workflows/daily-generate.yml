name: Daily lesson generator

# Drains queued lessons in Cosmos every morning. Uses the same
# `scripts/generate_lessons.py --pending` Sam runs locally, but with
# OIDC against atlas-functions-sp (no long-lived secrets).

on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC daily
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: daily-generate
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install script dependencies
        working-directory: scripts
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Drain queued lessons
        env:
          COSMOS_ENDPOINT: ${{ vars.COSMOS_ENDPOINT }}
          COSMOS_DATABASE: ${{ vars.COSMOS_DATABASE }}
          FOUNDRY_PROJECT_ENDPOINT: ${{ vars.FOUNDRY_PROJECT_ENDPOINT }}
          FOUNDRY_DEPLOYMENT: ${{ vars.FOUNDRY_DEPLOYMENT }}
          ATLAS_OWNER_LOGIN: ${{ vars.ATLAS_OWNER_LOGIN }}
        run: python scripts/generate_lessons.py --pending
